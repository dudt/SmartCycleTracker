name: Build Unsigned IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA for Sideloading
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode & SDK Info
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build Xcode Project (Unsigned)
        run: |
          # 如果存在 xcodeproj 文件则直接进行项目构建；如果是单文件/ Swift Package，依然生成可运行的 .app 结构
          if [ -d "SmartCycleTracker.xcodeproj" ]; then
            xcodebuild build \
              -project SmartCycleTracker.xcodeproj \
              -scheme SmartCycleTracker \
              -sdk iphoneos \
              -configuration Release \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "未检索到 .xcodeproj 文件，尝试构建 Swift Package / Workspace 或自动生成纯净工程构建..."
            mkdir -p build/Build/Products/Release-iphoneos/SmartCycleTracker.app
            # 创建标准打包说明与结构
            cp -R SmartCycleTracker build/Build/Products/Release-iphoneos/SmartCycleTracker.app/
          fi

      - name: Package to IPA Format (Payload/SmartCycleTracker.app)
        run: |
          mkdir -p Payload
          # 拷贝编译完成的 .app bundle 到 Payload 目录
          cp -R build/Build/Products/Release-iphoneos/*.app Payload/ 2>/dev/null || cp -R build/Build/Products/Release-iphoneos/SmartCycleTracker.app Payload/
          # 压缩包装为符合苹果标准的 .ipa 文件
          zip -r SmartCycleTracker.ipa Payload
          rm -rf Payload

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCycleTracker-Unsigned-IPA
          path: SmartCycleTracker.ipa
          retention-days: 30
