name: Build Unsigned IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA for Sideloading
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode & SDK Info
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build Xcode App (Unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project SmartCycleTracker.xcodeproj \
            -scheme SmartCycleTracker \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO 2>&1 | tee xcodebuild.log

      - name: Print Build Diagnostics on Failure
        if: failure()
        run: |
          echo "===== 编译失败，输出详细错误日志 ====="
          grep -i -C 3 "error:" xcodebuild.log || tail -n 100 xcodebuild.log

      - name: Verify Compiled App Bundle
        run: |
          ls -la build/Build/Products/Release-iphoneos/
          du -sh build/Build/Products/Release-iphoneos/SmartCycleTracker.app

      - name: Package to IPA Format (Payload/SmartCycleTracker.app)
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/SmartCycleTracker.app Payload/
          zip -r SmartCycleTracker.ipa Payload
          rm -rf Payload
          
          echo "检查生成的 IPA 文件体积与明细："
          ls -lh SmartCycleTracker.ipa

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCycleTracker-Unsigned-IPA
          path: SmartCycleTracker.ipa
          retention-days: 30
